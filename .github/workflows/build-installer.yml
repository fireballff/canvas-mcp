name: Build Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: installer

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        run: npm ci

      - name: Fetch sidecar (Node.js + canvas-mcp)
        run: npm run prepare:sidecar

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.target }}
          path: |
            installer/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.dmg
            installer/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            installer/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            installer/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
