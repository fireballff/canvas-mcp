name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    permissions:
      security-events: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            os: ubuntu-latest
          - language: rust
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - if: matrix.language == 'rust'
        name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - if: matrix.language == 'rust'
        name: Install Tauri system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - if: matrix.language == 'rust'
        name: Create sidecar stubs for CodeQL build
        run: |
          mkdir -p installer/src-tauri/resources/sidecar
          touch installer/src-tauri/resources/sidecar/index.js
          touch installer/src-tauri/resources/sidecar/node

      - if: matrix.language == 'rust'
        name: Build Rust (for CodeQL)
        run: cargo build
        working-directory: installer/src-tauri

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
